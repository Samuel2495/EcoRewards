<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - EcoRewards</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">
            <img src="images/21.png" alt="EcoRewards Logo" class="logo-img">
            <span>EcoRewards</span>
        </div>
        <div class="nav-links">
            <a href="admin-dashboard.html" class="active">Dashboard</a>
            <a href="manage-users.html">Manage Users</a>
            <a href="leaderboard.html">Leaderboard</a>
        </div>
        <div class="auth-buttons">
            <span class="admin-name">Admin</span>
            <button onclick="handleLogout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <!-- Admin Dashboard Content -->
    <div class="dashboard-container">
        <h1 style="color:white">Admin Dashboard</h1>
        <div class="admin-stats-table">
            <div class="stat-row">
                <div class="stat-label">Total Users</div>
                <div class="stat-value" id="totalUsers">0</div>
            </div>
            <div class="stat-row">
                <div class="stat-label">Active Tasks</div>
                <div class="stat-value" id="activeTasks">15</div>
            </div>
            <div class="stat-row">
                <div class="stat-label">Total Points Awarded</div>
                <div class="stat-value" id="totalPoints">0</div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Check if user is logged in and is admin
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser || currentUser.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }

            // Update admin name
            document.querySelector('.admin-name').textContent = currentUser.username;

            // Update stats
            const users = JSON.parse(localStorage.getItem('users'));
            document.getElementById('totalUsers').textContent = users.length - 1; // Excluding admin
            document.getElementById('totalPoints').textContent = users.reduce((sum, user) => sum + user.points, 0);
        });

        function handleLogout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
