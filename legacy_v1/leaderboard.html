<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - EcoRewards</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">
            <img src="images/21.png" alt="EcoRewards Logo" class="logo-img">
            <span>EcoRewards</span>
        </div>
        <div class="nav-links">
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="manage-users.html">Manage Users</a>
            <a href="leaderboard.html" class="active">Leaderboard</a>
        </div>
        <div class="auth-buttons">
            <span class="admin-name">Admin</span>
            <button onclick="handleLogout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="leaderboard-container">
        <h1>Top Performers</h1>
        
        <!-- Podium Section -->
        <div class="podium-container">
            <!-- Second Place -->
            <div class="podium-spot second-place">
                <div class="avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="user-info">
                    <h3>Samuel Simon</h3>
                    <p>850 points</p>
                </div>
                <div class="podium-block" style="height: 150px;">
                    <span class="position">2</span>
                </div>
            </div>

            <!-- First Place -->
            <div class="podium-spot first-place">
                <div class="avatar">
                    <i class="fas fa-crown"></i>
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="user-info">
                    <h3>Sharaun V R</h3>
                    <p>1200 points</p>
                </div>
                <div class="podium-block" style="height: 200px;">
                    <span class="position">1</span>
                </div>
            </div>

            <!-- Third Place -->
            <div class="podium-spot third-place">
                <div class="avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="user-info">
                    <h3>Sreeraj V R</h3>
                    <p>650 points</p>
                </div>
                <div class="podium-block" style="height: 100px;">
                    <span class="position">3</span>
                </div>
            </div>
        </div>

        <!-- Other Rankings -->
        <div class="rankings-table">
            <h2>All Rankings</h2>
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>User</th>
                        <th>Points</th>
                        <th>Tasks Completed</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Sharaun V R</td>
                        <td>1200</td>
                        <td>48</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Samuel Simon</td>
                        <td>850</td>
                        <td>34</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Sreeraj V R</td>
                        <td>650</td>
                        <td>26</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Check if user is logged in and is admin
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser || currentUser.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }
            document.querySelector('.admin-name').textContent = currentUser.username;
        });

        function handleLogout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
