<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - EcoRewards</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span id="userName">User Name</span>
            </div>
            <a href="#" class="active" data-section="tasks-section">
                <i class="fas fa-tasks"></i> Daily Tasks
            </a>
            <a href="#" data-section="profile-section">
                <i class="fas fa-user"></i> User Profile
            </a>
            <a href="#" data-section="history-section">
                <i class="fas fa-history"></i> Disposal History
            </a>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Daily Tasks Section -->
            <section id="tasks-section" class="content-section active">
                <h1 style="color:white">Daily Tasks</h1>
                <div class="streak-card">
                    <i class="fas fa-fire"></i>
                    <span id="streakCount">0</span>
                    <span>Day Streak!</span>
                </div>
                <div class="tasks-container">
                    <div id="tasksList" class="tasks-grid">
                        <!-- Tasks will be populated here -->
                    </div>
                </div>
            </section>

            <!-- Profile Section -->
            <section id="profile-section" class="content-section">
                <h1>User Profile</h1>
                <div class="profile-card">
                    <div class="profile-info">
                        <h2 id="profileName">Full Name</h2>
                        <p><i class="fas fa-user"></i> <span id="profileUsername">Username</span></p>
                        <p><i class="fas fa-envelope"></i> <span id="profileEmail">Email</span></p>
                        <p><i class="fas fa-phone"></i> <span id="profilePhone">Phone</span></p>
                    </div>
                    <div class="profile-stats">
                        <div class="stat-item">
                            <h3>Points</h3>
                            <p id="profilePoints">0</p>
                        </div>
                        <div class="stat-item">
                            <h3>Credits</h3>
                            <p id="profileCredits">0</p>
                        </div>
                        <div class="stat-item">
                            <h3>Tasks Completed</h3>
                            <p id="profileTasks">0</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Disposal History Section -->
            <section id="history-section" class="content-section">
                <h1>Disposal History</h1>
                <div class="history-container">
                    <div id="disposalHistory">
                        <!-- History will be populated here -->
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="tasks.js"></script>
    <script>
        // Ensure tasks are loaded before initializing dashboard
        window.addEventListener('DOMContentLoaded', () => {
            if (!window.taskDatabase) {
                console.error('Task database not loaded');
                return;
            }
            initializeDashboard();
        });
    </script>
    <script src="user-dashboard.js"></script>
</body>
</html>
