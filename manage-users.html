<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - EcoRewards</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">
            <img src="images/21.png" alt="EcoRewards Logo" class="logo-img">
            <span>EcoRewards</span>
        </div>
        <div class="nav-links">
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="manage-users.html" class="active">Manage Users</a>
            <a href="reports.html">Reports</a>
        </div>
        <div class="auth-buttons">
            <span class="admin-name">Admin</span>
            <button onclick="handleLogout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <!-- Manage Users Content -->
    <div class="manage-users-container">
        <h1 style="color:white">Manage Users</h1>
        
        <!-- Search and Filter -->
        <div class="user-controls">
            <input type="text" id="searchUser" placeholder="Search users..." onkeyup="filterUsers()">
            <button onclick="showAddUserModal()" class="add-user-btn">
                <i class="fas fa-user-plus"></i> Add New User
            </button>
        </div>

        <!-- Users Table -->
        <div class="users-table-container">
            <table class="users-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Points</th>
                        <th>Credits</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Users will be populated here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editUserModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>Edit User</h2>
            <form id="editUserForm" onsubmit="handleEditUser(event)">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label for="editFullName">Full Name</label>
                    <input type="text" id="editFullName" required>
                </div>
                <div class="form-group">
                    <label for="editEmail">Email</label>
                    <input type="email" id="editEmail" required>
                </div>
                <div class="form-group">
                    <label for="editPhone">Phone</label>
                    <input type="tel" id="editPhone" required>
                </div>
                <div class="form-group">
                    <label for="editPoints">Points</label>
                    <input type="number" id="editPoints" required>
                </div>
                <div class="form-group">
                    <label for="editCredits">Credits</label>
                    <input type="number" id="editCredits" required>
                </div>
                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>

    <script>
        // Check admin authentication
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser || currentUser.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }
            document.querySelector('.admin-name').textContent = currentUser.username;
            loadUsers();
        });

        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('users'));
            const tableBody = document.getElementById('usersTableBody');
            tableBody.innerHTML = '';

            users.forEach(user => {
                if (user.role !== 'admin') { // Don't show admin in the list
                    const row = `
                        <tr>
                            <td>${user.username}</td>
                            <td>${user.fullName}</td>
                            <td>${user.email}</td>
                            <td>${user.phone}</td>
                            <td>${user.points}</td>
                            <td>${user.credits}</td>
                            <td>
                                <button onclick="editUser('${user.id}')" class="action-btn edit">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="deleteUser('${user.id}')" class="action-btn delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                }
            });
        }

        function filterUsers() {
            const searchText = document.getElementById('searchUser').value.toLowerCase();
            const rows = document.getElementById('usersTableBody').getElementsByTagName('tr');

            Array.from(rows).forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(searchText) ? '' : 'none';
            });
        }

        function editUser(userId) {
            const users = JSON.parse(localStorage.getItem('users'));
            const user = users.find(u => u.id === userId);
            if (user) {
                document.getElementById('editUserId').value = user.id;
                document.getElementById('editFullName').value = user.fullName;
                document.getElementById('editEmail').value = user.email;
                document.getElementById('editPhone').value = user.phone;
                document.getElementById('editPoints').value = user.points;
                document.getElementById('editCredits').value = user.credits;
                document.getElementById('editUserModal').style.display = 'block';
            }
        }

        function handleEditUser(event) {
            event.preventDefault();
            const userId = document.getElementById('editUserId').value;
            const users = JSON.parse(localStorage.getItem('users'));
            const userIndex = users.findIndex(u => u.id === userId);

            if (userIndex !== -1) {
                users[userIndex] = {
                    ...users[userIndex],
                    fullName: document.getElementById('editFullName').value,
                    email: document.getElementById('editEmail').value,
                    phone: document.getElementById('editPhone').value,
                    points: parseInt(document.getElementById('editPoints').value),
                    credits: parseInt(document.getElementById('editCredits').value)
                };

                localStorage.setItem('users', JSON.stringify(users));
                closeEditModal();
                loadUsers();
            }
        }

        function deleteUser(userId) {
            if (confirm('Are you sure you want to delete this user?')) {
                const users = JSON.parse(localStorage.getItem('users'));
                const filteredUsers = users.filter(u => u.id !== userId);
                localStorage.setItem('users', JSON.stringify(filteredUsers));
                loadUsers();
            }
        }

        function closeEditModal() {
            document.getElementById('editUserModal').style.display = 'none';
        }

        function handleLogout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
